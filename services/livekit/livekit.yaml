# LiveKit SFU config for the voicebot lab.
# Loopback-only deployment on the Asterisk VM. All peers (agent, SIP GW)
# reach the SFU via the internal docker network `lk`.

port: 7880

rtc:
  tcp_port: 7881
  # UDP mux keeps the media plane on a single port instead of a range.
  # Since agent + SIP GW are on the same host, no external ICE candidates
  # are needed. use_external_ip=false skips STUN lookups.
  udp_port: 7882
  use_external_ip: false

redis:
  address: redis:6379

# Keys used by:
#   - `lk` CLI (trunk/dispatch provisioning during install)
#   - the agent worker (to register with the SFU)
#   - livekit-sip (to talk to the SFU as a participant)
# Populate from .env via envsubst at deploy time (install.sh renders this).
keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

logging:
  level: info
