name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: shellcheck shell scripts
        run: |
          find . -name '*.sh' -not -path './.git/*' -not -path '*/.venv/*' \
            -not -path './.specify/*' -print0 \
            | xargs -0 shellcheck

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: install ruff
        run: pip install ruff
      - name: ruff check python scripts
        run: ruff check infra/scripts/ vms/asterisk/services/
