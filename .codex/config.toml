# Codex configuration for the asterisk-lab project.
# Model, sandbox, and reasoning-effort are starting points; adjust in a
# follow-up commit when the operator settles on preferred defaults.
model = "gpt-5.5"
sandbox_mode = "danger-full-access"
model_reasoning_effort = "xhigh"
project_root_markers = [".git", ".codex", "AGENTS.md"]

[features]
# AGENTS.md hard rule: agent memory is repo-tracked only. Durable knowledge
# goes to docs/memory/*, never to Codex's private memory store.
memories = false

# Project MCP servers, mirrored with .mcp.json (both files stay in sync).
# None configured at project scope; add here and in .mcp.json together.
