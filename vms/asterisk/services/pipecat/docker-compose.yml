# Pipecat voicebot stack — runs on the Asterisk VM alongside Asterisk itself.
# Host network mode so the AudioSocket TCP listener at port 8090 is
# reachable from the Asterisk dialplan (127.0.0.1:8090). No SFU, no SIP GW —
# Asterisk's AudioSocket channel connects directly.
#
# Mounts /var/lib/voicebot plus services/common so usage.jsonl and
# turns.jsonl share one code path with the other tooling.

name: voicebot-pipecat

services:
  agent:
    build:
      context: ./agent
    container_name: pc-agent
    restart: unless-stopped
    network_mode: host
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SONIOX_API_KEY: ${SONIOX_API_KEY}
      AUDIOSOCKET_HOST: "0.0.0.0"
      AUDIOSOCKET_PORT: "8090"
      AUDIOSOCKET_SAMPLE_RATE: ${AUDIOSOCKET_SAMPLE_RATE:-16000}
      VOICEBOT_MODEL_PROFILE: ${VOICEBOT_MODEL_PROFILE:-soniox-streaming-telephony}
      VOICEBOT_STT_MODEL: ${VOICEBOT_STT_MODEL:-stt-rt-v5}
      VOICEBOT_LLM_MODEL: ${VOICEBOT_LLM_MODEL:-gpt-4o-mini}
      VOICEBOT_TTS_MODEL: ${VOICEBOT_TTS_MODEL:-tts-rt-v1}
      VOICEBOT_TTS_VOICE: ${VOICEBOT_TTS_VOICE:-Adrian}
      VOICEBOT_STT_ENDPOINT_SENSITIVITY: ${VOICEBOT_STT_ENDPOINT_SENSITIVITY:-}
      VOICEBOT_STT_MAX_ENDPOINT_DELAY_MS: ${VOICEBOT_STT_MAX_ENDPOINT_DELAY_MS:-}
      VOICEBOT_ECHO_FILTER: ${VOICEBOT_ECHO_FILTER:-1}
      VOICEBOT_REPO_REVISION: ${VOICEBOT_REPO_REVISION:-unknown}
      VOICEBOT_RUN_ID: ${VOICEBOT_RUN_ID:-}
    volumes:
      - /var/lib/voicebot:/var/lib/voicebot
      - ../common:/opt/voicebot-common:ro
      - ../../../:/opt/voicebot-docs:ro
