{% extends "base.html" %}
{% block title %}Transcriber - Voicebot Observability{% endblock %}
{% block content %}
<h2 class="page-title mb-3">Batch transcriber status</h2>
<div class="row row-deck row-cards mb-3">
  <div class="col-sm-4">
    <div class="card"><div class="card-body">
      <div class="text-secondary">transcriber.service</div>
      <div class="h1" id="service-status">?</div>
    </div></div>
  </div>
  <div class="col-sm-4">
    <div class="card"><div class="card-body">
      <div class="text-secondary">Recordings</div>
      <div class="h1" id="total-count">?</div>
    </div></div>
  </div>
  <div class="col-sm-4">
    <div class="card"><div class="card-body">
      <div class="text-secondary">Pending transcription</div>
      <div class="h1" id="pending-count">?</div>
    </div></div>
  </div>
</div>
<div class="card">
  <div class="table-responsive">
    <table class="table card-table table-vcenter">
      <thead><tr><th>File</th><th>Modified</th><th>Status</th></tr></thead>
      <tbody id="recordings-body">
        <tr><td colspan="3" class="text-secondary">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
pollJson("/api/transcriber", {{ refresh_s * 1000 }}, (data) => {
  const status = document.getElementById("service-status");
  status.textContent = data.service_active ? "active" : "inactive";
  status.className = "h1 " + (data.service_active ? "text-success" : "text-danger");
  document.getElementById("total-count").textContent = data.total;
  document.getElementById("pending-count").textContent = data.pending;

  const body = document.getElementById("recordings-body");
  if (!data.recordings.length) {
    body.innerHTML = '<tr><td colspan="3" class="text-secondary">No recordings found.</td></tr>';
    return;
  }
  body.innerHTML = data.recordings.map(r => `
    <tr>
      <td>${r.file}</td>
      <td>${fmtTs(r.mtime)}</td>
      <td>${r.transcribed ? '<span class="badge bg-green-lt">done</span>' : '<span class="badge bg-yellow-lt">pending</span>'}</td>
    </tr>
  `).join("");
});
</script>
{% endblock %}
